services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  agent-api:
    build:
      context: ./agent
      dockerfile: Dockerfile
      args:
        AGENT_VERSION: ${AGENT_VERSION:-dev}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://agent:agent@postgres:5432/agent
    ports:
      - "8000:8000"
    volumes:
      - ./data/published/duckdb:/app/data/published/duckdb:ro
      - ./artifacts:/app/artifacts
    tmpfs:
      - /tmp/duckdb
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
